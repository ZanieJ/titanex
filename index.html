<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pallet ID Extractor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
    }
    h1 {
      margin-bottom: 1rem;
    }
    .container {
      max-width: 600px;
      margin: auto;
    }
    .progress {
      margin: 1rem 0;
      font-weight: bold;
    }
    textarea {
      width: 100%;
      height: 200px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pallet ID Extractor</h1>
    <input type="file" id="pdf-upload" accept="application/pdf" />
    <div id="progress" class="progress"></div>
    <textarea id="output" placeholder="Extracted Pallet IDs will appear here..."></textarea>
  </div>

  <!-- Load PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- Load our logic -->
  <script type="module" src="/main.js"></script>
</body>
</html>
